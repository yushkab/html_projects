<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математика + Физика: Игра</title>
    <style>
        :root {
            --bg: #0a0a14;
            --surface: #141428;
            --surface2: #1a1a35;
            --accent: #ff6b6b;
            --accent2: #4ecdc4;
            --accent3: #ffe66d;
            --gold: #ffd700;
            --text: #e0e0e0;
            --text2: #b0b0c0;
            --success: #2ecc71;
            --danger: #e74c3c;
            --border: #2a2a45;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(255, 107, 107, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 60%, rgba(78, 205, 196, 0.05) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(255, 230, 109, 0.04) 0%, transparent 50%);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .game-container {
            background: var(--surface);
            border-radius: 20px;
            box-shadow: var(--shadow), 0 0 0 1px var(--border);
            width: 100%;
            max-width: 820px;
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .game-header {
            background: var(--surface2);
            padding: 18px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        .game-title {
            font-size: 1.5em;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .score-display {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .score-item {
            background: var(--surface);
            border-radius: 30px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 7px;
            font-weight: 700;
            font-size: 0.95em;
            color: var(--text);
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .score-item.combo {
            border-color: var(--accent3);
            animation: pulseCombo 2s ease-in-out infinite;
        }
        @keyframes pulseCombo {
            0%,
            100% {
                box-shadow: 0 0 0 rgba(255, 230, 109, 0);
            }
            50% {
                box-shadow: 0 0 18px rgba(255, 230, 109, 0.35);
            }
        }
        .score-icon {
            font-size: 1.3em;
        }
        .score-value {
            color: var(--gold);
            font-size: 1.1em;
            min-width: 36px;
            text-align: center;
            transition: var(--transition);
        }
        .score-value.pop {
            animation: popScore 0.4s ease-out;
        }
        @keyframes popScore {
            0% {
                transform: scale(1.6);
                color: #fff;
            }
            100% {
                transform: scale(1);
                color: var(--gold);
            }
        }
        .lives-display {
            display: flex;
            gap: 3px;
        }
        .heart {
            font-size: 1.2em;
            transition: var(--transition);
        }
        .heart.lost {
            opacity: 0.2;
            transform: scale(0.7);
            filter: grayscale(1);
        }

        /* Tabs */
        .tabs-nav {
            display: flex;
            background: var(--surface2);
            border-bottom: 2px solid var(--border);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .tab-btn {
            flex: 1 1 auto;
            min-width: 100px;
            padding: 14px 18px;
            border: none;
            background: transparent;
            color: var(--text2);
            cursor: pointer;
            font-size: 0.95em;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: var(--transition);
            position: relative;
            white-space: nowrap;
            font-family: inherit;
        }
        .tab-btn:hover {
            color: var(--text);
            background: rgba(255, 255, 255, 0.02);
        }
        .tab-btn.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 20%;
            width: 60%;
            height: 3px;
            border-radius: 3px 3px 0 0;
            background: var(--accent);
        }
        .tab-btn[data-tab="physics"].active::after {
            background: var(--accent);
        }
        .tab-btn[data-tab="algebra"].active::after {
            background: var(--accent2);
        }
        .tab-btn[data-tab="geometry"].active::after {
            background: var(--accent3);
        }
        .tab-icon {
            margin-right: 6px;
        }

        /* Tab content */
        .tab-content {
            display: none;
            padding: 20px;
            animation: fadeSlideIn 0.4s ease-out;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Canvas wrapper */
        .canvas-wrapper {
            position: relative;
            background: #0d0d1f;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            margin-bottom: 16px;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            cursor: crosshair;
        }

        /* Controls */
        .controls-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface2);
            border-radius: 25px;
            padding: 8px 14px;
            border: 1px solid var(--border);
        }
        .control-group label {
            font-weight: 600;
            font-size: 0.85em;
            color: var(--text2);
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        .control-group input[type="range"] {
            width: 90px;
            accent-color: var(--accent);
            cursor: pointer;
        }
        .control-value {
            font-weight: 700;
            color: var(--text);
            min-width: 38px;
            text-align: center;
            font-size: 0.9em;
        }
        .btn {
            padding: 10px 22px;
            border-radius: 25px;
            border: none;
            font-weight: 700;
            font-size: 0.95em;
            cursor: pointer;
            letter-spacing: 0.4px;
            transition: var(--transition);
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        .btn-fire {
            background: var(--accent);
            color: #fff;
            font-size: 1em;
            padding: 11px 28px;
            box-shadow: 0 4px 18px rgba(255, 107, 107, 0.4);
        }
        .btn-fire:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(255, 107, 107, 0.55);
        }
        .btn-fire:active {
            transform: scale(0.94);
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
        }
        .btn-submit {
            background: var(--accent2);
            color: #111;
            font-weight: 700;
            box-shadow: 0 4px 16px rgba(78, 205, 196, 0.3);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(78, 205, 196, 0.45);
        }
        .btn-submit:active {
            transform: scale(0.94);
        }
        .btn-skip {
            background: transparent;
            color: var(--text2);
            border: 1px solid var(--border);
        }
        .btn-skip:hover {
            border-color: var(--text2);
            color: var(--text);
        }

        /* Question card */
        .question-card {
            background: var(--surface2);
            border-radius: var(--radius);
            padding: 20px 24px;
            border: 1px solid var(--border);
            text-align: center;
            transition: var(--transition);
        }
        .question-card.correct-flash {
            border-color: var(--success) !important;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.4) !important;
        }
        .question-card.wrong-flash {
            border-color: var(--danger) !important;
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.4) !important;
            animation: shake 0.5s ease-out;
        }
        @keyframes shake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-8px);
            }
            40% {
                transform: translateX(8px);
            }
            60% {
                transform: translateX(-5px);
            }
            80% {
                transform: translateX(5px);
            }
        }
        .question-text {
            font-size: 1.5em;
            font-weight: 700;
            color: #fff;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .question-subtitle {
            font-size: 0.9em;
            color: var(--text2);
            margin-bottom: 14px;
        }
        .answer-input-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }
        .answer-input {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 30px;
            padding: 11px 18px;
            font-size: 1.1em;
            color: #fff;
            width: 160px;
            text-align: center;
            font-family: inherit;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: var(--transition);
            outline: none;
        }
        .answer-input:focus {
            border-color: var(--accent2);
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.2);
        }
        .feedback-msg {
            margin-top: 10px;
            font-weight: 700;
            font-size: 1em;
            min-height: 24px;
            transition: var(--transition);
        }
        .feedback-msg.success {
            color: var(--success);
        }
        .feedback-msg.error {
            color: var(--danger);
        }

        /* Timer bar */
        .timer-bar-wrap {
            height: 5px;
            background: var(--border);
            border-radius: 5px;
            margin-top: 10px;
            overflow: hidden;
        }
        .timer-bar-fill {
            height: 100%;
            background: var(--accent2);
            border-radius: 5px;
            transition: width 0.1s linear;
        }
        .timer-bar-fill.warning {
            background: var(--accent3);
        }
        .timer-bar-fill.danger {
            background: var(--danger);
        }

        /* Geometry canvas */
        .geo-canvas-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 12px;
        }
        .geo-canvas-wrap canvas {
            border-radius: var(--radius);
            background: #0d0d1f;
            border: 1px solid var(--border);
            max-width: 100%;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: var(--surface2);
            color: #fff;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1em;
            letter-spacing: 0.4px;
            z-index: 999;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            text-align: center;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.perfect {
            border-color: var(--gold);
            background: #1a1a10;
        }

        /* Particles layer */
        .particles-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 998;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .game-header {
                padding: 12px 14px;
                gap: 8px;
            }
            .game-title {
                font-size: 1.2em;
            }
            .tab-btn {
                padding: 10px 12px;
                font-size: 0.8em;
                min-width: 70px;
            }
            .tab-content {
                padding: 12px;
            }
            .question-text {
                font-size: 1.2em;
            }
            .answer-input {
                width: 120px;
                font-size: 0.95em;
            }
            .controls-row {
                gap: 6px;
            }
            .control-group {
                padding: 6px 10px;
                gap: 4px;
            }
            .control-group input[type="range"] {
                width: 60px;
            }
            .btn {
                padding: 8px 16px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Header -->
        <div class="game-header">
            <span class="game-title">📐 Math & Physics Game</span>
            <div class="score-display">
                <div class="score-item">
                    <span class="score-icon">⭐</span>
                    <span>Счёт:</span>
                    <span class="score-value" id="totalScore">0</span>
                </div>
                <div class="score-item combo" id="comboBadge">
                    <span class="score-icon">🔥</span>
                    <span>Комбо:</span>
                    <span class="score-value" id="comboCount">x1</span>
                </div>
                <div class="score-item">
                    <span>Уровень:</span>
                    <span class="score-value" id="levelDisplay">1</span>
                </div>
                <div class="lives-display" id="livesDisplay">
                    <span class="heart">❤️</span>
                    <span class="heart">❤️</span>
                    <span class="heart">❤️</span>
                    <span class="heart">❤️</span>
                    <span class="heart">❤️</span>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs-nav">
            <button class="tab-btn active" data-tab="physics">
                <span class="tab-icon">🎯</span> Физика
            </button>
            <button class="tab-btn" data-tab="algebra">
                <span class="tab-icon">🧮</span> Алгебра
            </button>
            <button class="tab-btn" data-tab="geometry">
                <span class="tab-icon">📏</span> Геометрия
            </button>
        </div>

        <!-- Physics Tab -->
        <div class="tab-content active" id="tab-physics">
            <div class="canvas-wrapper">
                <canvas id="physicsCanvas" width="760" height="420"></canvas>
            </div>
            <div class="controls-row">
                <div class="control-group">
                    <label>🎯 Угол:</label>
                    <input type="range" id="angleSlider" min="10" max="75" value="45" step="1">
                    <span class="control-value" id="angleValue">45°</span>
                </div>
                <div class="control-group">
                    <label>💪 Сила:</label>
                    <input type="range" id="powerSlider" min="35" max="95" value="60" step="1">
                    <span class="control-value" id="powerValue">60</span>
                </div>
                <button class="btn btn-fire" id="btnFire">🚀 ОГОНЬ!</button>
                <button class="btn btn-skip" id="btnSkipPhysics">Пропустить</button>
            </div>
            <div style="color:var(--text2);font-size:0.85em;text-align:center;margin-top:4px;">
                Попади в мишень! Ближе к центру = больше очков. Учитывай гравитацию (g=9.8 м/с²)
            </div>
        </div>

        <!-- Algebra Tab -->
        <div class="tab-content" id="tab-algebra">
            <div class="question-card" id="algebraCard">
                <div class="question-text" id="algebraQuestion">Решите уравнение: 3x + 7 = 22</div>
                <div class="question-subtitle">Найдите значение x</div>
                <div class="answer-input-row">
                    <span style="font-size:1.4em;font-weight:700;color:#fff;">x =</span>
                    <input type="text" class="answer-input" id="algebraInput" placeholder="Ответ" autocomplete="off">
                    <button class="btn btn-submit" id="btnAlgebraSubmit">✅ Проверить</button>
                </div>
                <div class="feedback-msg" id="algebraFeedback"></div>
                <div class="timer-bar-wrap"><div class="timer-bar-fill" id="algebraTimerBar"></div></div>
                <button class="btn btn-skip" style="margin-top:10px;" id="btnSkipAlgebra">Пропустить ⏭</button>
            </div>
        </div>

        <!-- Geometry Tab -->
        <div class="tab-content" id="tab-geometry">
            <div class="geo-canvas-wrap">
                <canvas id="geometryCanvas" width="400" height="280"></canvas>
            </div>
            <div class="question-card" id="geometryCard">
                <div class="question-text" id="geometryQuestion">Найдите площадь круга</div>
                <div class="question-subtitle" id="geometrySubtitle">Радиус r = 5. Ответ округлите до 1 знака</div>
                <div class="answer-input-row">
                    <input type="text" class="answer-input" id="geometryInput" placeholder="Ответ" autocomplete="off">
                    <button class="btn btn-submit" id="btnGeometrySubmit">✅ Проверить</button>
                </div>
                <div class="feedback-msg" id="geometryFeedback"></div>
                <div class="timer-bar-wrap"><div class="timer-bar-fill" id="geometryTimerBar"></div></div>
                <button class="btn btn-skip" style="margin-top:10px;" id="btnSkipGeometry">Пропустить ⏭</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
    <!-- Particles -->
    <div class="particles-layer" id="particlesLayer"></div>

    <script>
        (function() {
            // ==================== GAME STATE ====================
            const state = {
                score: 0,
                combo: 0,
                maxCombo: 0,
                lives: 5,
                level: 1,
                totalCorrect: 0,
                totalWrong: 0,
                physicsHits: 0,
                physicsMisses: 0,
            };

            // ==================== DOM REFS ====================
            const totalScoreEl = document.getElementById('totalScore');
            const comboCountEl = document.getElementById('comboCount');
            const comboBadge = document.getElementById('comboBadge');
            const levelDisplay = document.getElementById('levelDisplay');
            const livesDisplay = document.getElementById('livesDisplay');
            const toast = document.getElementById('toast');
            const particlesLayer = document.getElementById('particlesLayer');

            // Tab buttons
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');
            let currentTab = 'physics';

            // Physics elements
            const physicsCanvas = document.getElementById('physicsCanvas');
            const ctxPhys = physicsCanvas.getContext('2d');
            const angleSlider = document.getElementById('angleSlider');
            const powerSlider = document.getElementById('powerSlider');
            const angleValue = document.getElementById('angleValue');
            const powerValue = document.getElementById('powerValue');
            const btnFire = document.getElementById('btnFire');
            const btnSkipPhysics = document.getElementById('btnSkipPhysics');

            // Algebra elements
            const algebraQuestion = document.getElementById('algebraQuestion');
            const algebraInput = document.getElementById('algebraInput');
            const algebraFeedback = document.getElementById('algebraFeedback');
            const algebraTimerBar = document.getElementById('algebraTimerBar');
            const algebraCard = document.getElementById('algebraCard');
            const btnAlgebraSubmit = document.getElementById('btnAlgebraSubmit');
            const btnSkipAlgebra = document.getElementById('btnSkipAlgebra');

            // Geometry elements
            const geometryCanvas = document.getElementById('geometryCanvas');
            const ctxGeo = geometryCanvas.getContext('2d');
            const geometryQuestion = document.getElementById('geometryQuestion');
            const geometrySubtitle = document.getElementById('geometrySubtitle');
            const geometryInput = document.getElementById('geometryInput');
            const geometryFeedback = document.getElementById('geometryFeedback');
            const geometryTimerBar = document.getElementById('geometryTimerBar');
            const geometryCard = document.getElementById('geometryCard');
            const btnGeometrySubmit = document.getElementById('btnGeometrySubmit');
            const btnSkipGeometry = document.getElementById('btnSkipGeometry');

            // ==================== TOAST SYSTEM ====================
            let toastTimeout;

            function showToast(message, type = '') {
                clearTimeout(toastTimeout);
                toast.textContent = message;
                toast.className = 'toast ' + type + ' show';
                toastTimeout = setTimeout(() => {
                    toast.classList.remove('show');
                }, 1800);
            }

            // ==================== PARTICLE SYSTEM ====================
            const particles = [];

            function spawnParticles(x, y, count, color, spread = 3, life = 40) {
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * spread + 1;
                    particles.push({
                        x,
                        y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed - Math.random() * 4,
                        life,
                        maxLife: life,
                        color,
                        size: Math.random() * 4 + 2,
                    });
                }
            }

            function spawnScreenParticles(count, color) {
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x: Math.random() * window.innerWidth,
                        y: Math.random() * window.innerHeight * 0.6,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8 - 2,
                        life: 50 + Math.random() * 30,
                        maxLife: 80,
                        color,
                        size: Math.random() * 5 + 2,
                    });
                }
            }

            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15;
                    p.life--;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            function renderParticles() {
                particlesLayer.innerHTML = '';
                const frag = document.createDocumentFragment();
                for (const p of particles) {
                    const el = document.createElement('div');
                    const alpha = Math.max(0, p.life / p.maxLife);
                    const size = p.size * alpha;
                    el.style.cssText = `
                        position:absolute;
                        left:${p.x}px;top:${p.y}px;
                        width:${size}px;height:${size}px;
                        border-radius:50%;
                        background:${p.color};
                        opacity:${alpha};
                        pointer-events:none;
                        transform:translate(-50%,-50%);
                    `;
                    frag.appendChild(el);
                }
                particlesLayer.appendChild(frag);
            }

            function particleLoop() {
                updateParticles();
                renderParticles();
                requestAnimationFrame(particleLoop);
            }
            particleLoop();

            // ==================== SCORE & LIVES ====================
            function addScore(points) {
                state.score += points;
                state.combo++;
                if (state.combo > state.maxCombo) state.maxCombo = state.combo;
                updateScoreUI();
                // Level up every 200 points
                const newLevel = Math.floor(state.score / 200) + 1;
                if (newLevel > state.level) {
                    state.level = newLevel;
                    showToast(`🎉 Уровень ${state.level}!`, 'perfect');
                    spawnScreenParticles(40, '#ffd700');
                }
            }

            function breakCombo() {
                state.combo = 0;
                updateScoreUI();
            }

            function loseLife() {
                if (state.lives > 0) {
                    state.lives--;
                    updateScoreUI();
                    if (state.lives <= 0) {
                        showToast('💔 Жизни закончились! Но ты можешь продолжать!', '');
                        state.lives = 1; // Give one more so game doesn't fully end
                    }
                }
            }

            function updateScoreUI() {
                totalScoreEl.textContent = state.score;
                totalScoreEl.classList.add('pop');
                setTimeout(() => totalScoreEl.classList.remove('pop'), 400);
                comboCountEl.textContent = 'x' + state.combo;
                if (state.combo >= 5) {
                    comboBadge.style.borderColor = '#ff6b6b';
                } else if (state.combo >= 3) {
                    comboBadge.style.borderColor = '#ffe66d';
                } else {
                    comboBadge.style.borderColor = '#ffe66d';
                }
                levelDisplay.textContent = state.level;
                // Update hearts
                const hearts = livesDisplay.querySelectorAll('.heart');
                hearts.forEach((h, i) => {
                    if (i >= state.lives) h.classList.add('lost');
                    else h.classList.remove('lost');
                });
            }

            // ==================== TAB SWITCHING ====================
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const tab = btn.dataset.tab;
                    switchTab(tab);
                });
            });

            function switchTab(tab) {
                currentTab = tab;
                tabBtns.forEach(b => b.classList.remove('active'));
                tabContents.forEach(c => c.classList.remove('active'));
                const targetBtn = document.querySelector(`.tab-btn[data-tab="${tab}"]`);
                const targetContent = document.getElementById(`tab-${tab}`);
                if (targetBtn) targetBtn.classList.add('active');
                if (targetContent) targetContent.classList.add('active');
                // Reset inputs
                algebraInput.value = '';
                algebraFeedback.textContent = '';
                geometryInput.value = '';
                geometryFeedback.textContent = '';
                // Restart timers if needed
                if (tab === 'algebra') resetAlgebraTimer();
                if (tab === 'geometry') resetGeometryTimer();
                if (tab === 'physics') drawPhysicsScene();
            }

            // ==================== PHYSICS CANNON GAME ====================
            const GROUND_Y = 355;
            const CANNON_X = 65;
            const CANNON_Y = GROUND_Y;
            const BARREL_LENGTH = 42;
            const GRAVITY = 18; // scaled for canvas
            const DT = 0.42;

            let targetX = 420;
            let targetRadius = 28;
            let cannonball = null; // {x, y, vx, vy, trail:[]}
            let isFlying = false;
            let physicsAnimId = null;
            let lastShotResult = null; // 'hit' | 'miss' | null
            let hitQuality = ''; // 'perfect' | 'great' | 'good' | 'ok'

            function getCannonTip() {
                const angleRad = parseFloat(angleSlider.value) * Math.PI / 180;
                const tipX = CANNON_X + BARREL_LENGTH * Math.cos(angleRad);
                const tipY = CANNON_Y - BARREL_LENGTH * Math.sin(angleRad);
                return { x: tipX, y: tipY, angleRad };
            }

            function spawnTarget() {
                const minDist = 180 + state.level * 8;
                const maxDist = 550 + state.level * 5;
                targetX = CANNON_X + minDist + Math.random() * (maxDist - minDist);
                targetX = Math.min(targetX, 700);
                targetRadius = Math.max(16, 30 - state.level * 1.2);
                if (state.level >= 8) targetRadius = Math.max(12, targetRadius);
            }

            function fireCannon() {
                if (isFlying) return;
                const { x, y, angleRad } = getCannonTip();
                const power = parseFloat(powerSlider.value);
                const vx = power * Math.cos(angleRad);
                const vy = -power * Math.sin(angleRad);
                cannonball = { x, y, vx, vy, trail: [{ x, y }] };
                isFlying = true;
                lastShotResult = null;
                hitQuality = '';
                btnFire.disabled = true;
                btnFire.textContent = '⏳ Летит...';
                if (physicsAnimId) cancelAnimationFrame(physicsAnimId);
                animatePhysics();
            }

            function animatePhysics() {
                if (!isFlying || !cannonball) {
                    physicsAnimId = null;
                    return;
                }
                const cb = cannonball;
                // Update position
                cb.x += cb.vx * DT;
                cb.y += cb.vy * DT;
                cb.vy += GRAVITY * DT;
                cb.trail.push({ x: cb.x, y: cb.y });
                // Limit trail length
                if (cb.trail.length > 180) cb.trail.shift();

                // Check ground collision
                if (cb.y >= GROUND_Y) {
                    cb.y = GROUND_Y;
                    cb.trail.push({ x: cb.x, y: cb.y });
                    // Check if hit target
                    const distToTarget = Math.abs(cb.x - targetX);
                    if (distToTarget < targetRadius) {
                        // HIT!
                        lastShotResult = 'hit';
                        const accuracy = 1 - (distToTarget / targetRadius);
                        if (accuracy > 0.85) {
                            hitQuality = 'perfect';
                            addScore(50 + state.level * 5);
                            showToast('🎯 ИДЕАЛЬНО! Буллсай!', 'perfect');
                            spawnScreenParticles(50, '#ffd700');
                        } else if (accuracy > 0.6) {
                            hitQuality = 'great';
                            addScore(30 + state.level * 3);
                            showToast('👍 Отлично! В яблочко!', '');
                            spawnScreenParticles(30, '#4ecdc4');
                        } else if (accuracy > 0.3) {
                            hitQuality = 'good';
                            addScore(20 + state.level * 2);
                            showToast('👌 Хорошо! Попадание!', '');
                            spawnScreenParticles(20, '#ffe66d');
                        } else {
                            hitQuality = 'ok';
                            addScore(10 + state.level);
                            showToast('😊 Попадание!', '');
                            spawnScreenParticles(12, '#ff6b6b');
                        }
                        state.physicsHits++;
                        spawnParticles(cb.x, cb.y, 25, '#ffd700', 6, 35);
                    } else {
                        // MISS
                        lastShotResult = 'miss';
                        hitQuality = '';
                        breakCombo();
                        loseLife();
                        state.physicsMisses++;
                        showToast('💨 Мимо! Попробуй снова', '');
                        spawnParticles(cb.x, cb.y, 15, '#888', 3, 20);
                    }
                    isFlying = false;
                    btnFire.disabled = false;
                    btnFire.textContent = '🚀 ОГОНЬ!';
                    // Spawn new target after delay
                    setTimeout(() => {
                        spawnTarget();
                        lastShotResult = null;
                        hitQuality = '';
                        drawPhysicsScene();
                    }, 800);
                }

                // Check out of bounds
                if (cb.x > 800 || cb.x < -50 || cb.y < -300) {
                    lastShotResult = 'miss';
                    hitQuality = '';
                    breakCombo();
                    loseLife();
                    state.physicsMisses++;
                    isFlying = false;
                    btnFire.disabled = false;
                    btnFire.textContent = '🚀 ОГОНЬ!';
                    showToast('💨 Снаряд улетел! Попробуй снова', '');
                    setTimeout(() => {
                        spawnTarget();
                        lastShotResult = null;
                        hitQuality = '';
                        drawPhysicsScene();
                    }, 800);
                }

                drawPhysicsScene();
                if (isFlying) {
                    physicsAnimId = requestAnimationFrame(animatePhysics);
                } else {
                    physicsAnimId = null;
                    drawPhysicsScene();
                }
            }

            function drawPhysicsScene() {
                const ctx = ctxPhys;
                const w = physicsCanvas.width;
                const h = physicsCanvas.height;
                ctx.clearRect(0, 0, w, h);

                // Sky gradient
                const skyGrad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
                skyGrad.addColorStop(0, '#1a1a3e');
                skyGrad.addColorStop(0.6, '#252555');
                skyGrad.addColorStop(1, '#3a3a6e');
                ctx.fillStyle = skyGrad;
                ctx.fillRect(0, 0, w, GROUND_Y);

                // Stars
                ctx.fillStyle = '#ffffff';
                const starSeed = 42;
                for (let i = 0; i < 35; i++) {
                    const sx = ((i * 173 + starSeed) % w);
                    const sy = ((i * 97 + starSeed * 3) % (GROUND_Y - 20));
                    const ss = ((i * 7) % 3) * 0.4 + 0.4;
                    ctx.globalAlpha = 0.3 + ((i * 13) % 5) * 0.12;
                    ctx.beginPath();
                    ctx.arc(sx, sy, ss, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;

                // Clouds
                drawCloud(ctx, 150, 55, 0.7);
                drawCloud(ctx, 400, 35, 0.5);
                drawCloud(ctx, 600, 70, 0.6);

                // Ground
                const groundGrad = ctx.createLinearGradient(0, GROUND_Y, 0, h);
                groundGrad.addColorStop(0, '#4a6741');
                groundGrad.addColorStop(0.3, '#3d5a35');
                groundGrad.addColorStop(1, '#2a3d22');
                ctx.fillStyle = groundGrad;
                ctx.fillRect(0, GROUND_Y, w, h - GROUND_Y);

                // Ground line
                ctx.strokeStyle = '#5a8a4a';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, GROUND_Y);
                ctx.lineTo(w, GROUND_Y);
                ctx.stroke();

                // Grass tufts
                ctx.strokeStyle = '#6b9b55';
                ctx.lineWidth = 1;
                for (let gx = 10; gx < w; gx += 25) {
                    const gh = 5 + Math.sin(gx * 0.3) * 4;
                    ctx.beginPath();
                    ctx.moveTo(gx, GROUND_Y);
                    ctx.lineTo(gx + 3, GROUND_Y - gh);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(gx + 5, GROUND_Y);
                    ctx.lineTo(gx + 8, GROUND_Y - gh - 2);
                    ctx.stroke();
                }

                // Target
                drawTarget(ctx, targetX, GROUND_Y, targetRadius, lastShotResult, hitQuality);

                // Cannon
                drawCannon(ctx, CANNON_X, CANNON_Y, parseFloat(angleSlider.value));

                // Trail
                if (cannonball && cannonball.trail.length > 1) {
                    ctx.strokeStyle = 'rgba(255,180,100,0.7)';
                    ctx.lineWidth = 2.5;
                    ctx.shadowColor = 'rgba(255,150,50,0.5)';
                    ctx.shadowBlur = 6;
                    ctx.beginPath();
                    ctx.moveTo(cannonball.trail[0].x, cannonball.trail[0].y);
                    for (let i = 1; i < cannonball.trail.length; i++) {
                        ctx.lineTo(cannonball.trail[i].x, cannonball.trail[i].y);
                    }
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    // Dots along trail
                    for (let i = 0; i < cannonball.trail.length; i += 6) {
                        const alpha = i / cannonball.trail.length;
                        ctx.fillStyle = `rgba(255,200,80,${alpha*0.7})`;
                        ctx.beginPath();
                        ctx.arc(cannonball.trail[i].x, cannonball.trail[i].y, 3 * alpha + 1, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }

                // Cannonball
                if (cannonball && isFlying) {
                    ctx.fillStyle = '#ff4444';
                    ctx.shadowColor = 'rgba(255,80,30,0.8)';
                    ctx.shadowBlur = 12;
                    ctx.beginPath();
                    ctx.arc(cannonball.x, cannonball.y, 7, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ff8888';
                    ctx.beginPath();
                    ctx.arc(cannonball.x - 2, cannonball.y - 2, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                // Aim line (dotted)
                if (!isFlying) {
                    const { x: tipX, y: tipY, angleRad } = getCannonTip();
                    ctx.setLineDash([6, 10]);
                    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(tipX, tipY);
                    ctx.lineTo(tipX + 200 * Math.cos(angleRad), tipY - 200 * Math.sin(angleRad));
                    ctx.stroke();
                    ctx.setLineDash([]);
                }

                // Hint text
                if (!isFlying && lastShotResult === null) {
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.font = '13px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('Настрой угол и силу, затем нажми ОГОНЬ!', w / 2, 30);
                }
                if (lastShotResult === 'hit') {
                    ctx.fillStyle = '#ffd700';
                    ctx.font = 'bold 18px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    const qText = hitQuality === 'perfect' ? 'ИДЕАЛЬНО! 🎯' :
                        hitQuality === 'great' ? 'ОТЛИЧНО! 👍' :
                        hitQuality === 'good' ? 'ХОРОШО! 👌' : 'ПОПАДАНИЕ! 😊';
                    ctx.fillText(qText, targetX, GROUND_Y - 55);
                }
                if (lastShotResult === 'miss') {
                    ctx.fillStyle = '#ff8888';
                    ctx.font = 'bold 16px "Segoe UI", sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('МИМО!', cannonball ? cannonball.x : targetX, GROUND_Y - 40);
                }
                ctx.textAlign = 'start';
            }

            function drawCloud(ctx, x, y, scale) {
                ctx.fillStyle = 'rgba(255,255,255,0.08)';
                ctx.beginPath();
                ctx.arc(x, y, 25 * scale, 0, Math.PI * 2);
                ctx.arc(x + 20 * scale, y - 10 * scale, 18 * scale, 0, Math.PI * 2);
                ctx.arc(x + 38 * scale, y, 22 * scale, 0, Math.PI * 2);
                ctx.arc(x + 15 * scale, y + 5 * scale, 16 * scale, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawTarget(ctx, tx, ty, radius, result, quality) {
                // Outer ring
                const ringColors = ['#ff4444', '#ff8844', '#ffcc44', '#ffffff'];
                for (let r = radius; r > 0; r -= radius / 4) {
                    const idx = Math.floor((radius - r) / (radius / 4));
                    ctx.fillStyle = ringColors[Math.min(idx, 3)];
                    ctx.beginPath();
                    ctx.arc(tx, ty - radius * 0.15, r, 0, Math.PI * 2);
                    ctx.fill();
                }
                // Bullseye dot
                ctx.fillStyle = '#111';
                ctx.beginPath();
                ctx.arc(tx, ty - radius * 0.15, radius * 0.2, 0, Math.PI * 2);
                ctx.fill();
                // Post
                ctx.fillStyle = '#6b5b3d';
                ctx.fillRect(tx - 3, ty - radius - 2, 6, radius + 4);
                // Glow on hit
                if (result === 'hit' && quality) {
                    ctx.fillStyle = quality === 'perfect' ? 'rgba(255,215,0,0.5)' : 'rgba(255,200,100,0.35)';
                    ctx.beginPath();
                    ctx.arc(tx, ty - radius * 0.15, radius * 1.8, 0, Math.PI * 2);
                    ctx.fill();
                }
                // Distance label
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = '11px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`${Math.round(tx - CANNON_X)}px`, tx, ty + 20);
                ctx.textAlign = 'start';
            }

            function drawCannon(ctx, cx, cy, angleDeg) {
                const angleRad = angleDeg * Math.PI / 180;
                // Base
                ctx.fillStyle = '#555';
                ctx.beginPath();
                ctx.arc(cx, cy, 16, 0, Math.PI);
                ctx.fill();
                ctx.fillStyle = '#444';
                ctx.fillRect(cx - 17, cy - 2, 34, 8);
                // Wheel
                ctx.fillStyle = '#3a3a3a';
                ctx.beginPath();
                ctx.arc(cx, cy, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#666';
                ctx.beginPath();
                ctx.arc(cx, cy, 5, 0, Math.PI * 2);
                ctx.fill();
                // Barrel
                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(-angleRad);
                const barrelGrad = ctx.createLinearGradient(0, -6, 0, 6);
                barrelGrad.addColorStop(0, '#888');
                barrelGrad.addColorStop(0.5, '#ccc');
                barrelGrad.addColorStop(1, '#666');
                ctx.fillStyle = barrelGrad;
                ctx.fillRect(0, -7, BARREL_LENGTH, 14);
                ctx.strokeStyle = '#444';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(0, -7, BARREL_LENGTH, 14);
                // Barrel tip highlight
                ctx.fillStyle = '#ddd';
                ctx.fillRect(BARREL_LENGTH - 8, -6, 6, 12);
                ctx.restore();
            }

            // Physics controls
            angleSlider.addEventListener('input', () => {
                angleValue.textContent = angleSlider.value + '°';
                if (!isFlying) drawPhysicsScene();
            });
            powerSlider.addEventListener('input', () => {
                powerValue.textContent = powerSlider.value;
                if (!isFlying) drawPhysicsScene();
            });
            btnFire.addEventListener('click', fireCannon);
            btnSkipPhysics.addEventListener('click', () => {
                if (isFlying) return;
                spawnTarget();
                lastShotResult = null;
                hitQuality = '';
                drawPhysicsScene();
                showToast('⏭ Мишень перемещена', '');
            });

            // Keyboard shortcut for fire
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && currentTab === 'physics' && !isFlying) {
                    e.preventDefault();
                    fireCannon();
                }
                if (e.code === 'Enter') {
                    if (currentTab === 'algebra') checkAlgebraAnswer();
                    if (currentTab === 'geometry') checkGeometryAnswer();
                }
            });

            // ==================== ALGEBRA ====================
            let algebraAnswer = 0;
            let algebraTimerInterval = null;
            let algebraTimeLeft = 0;
            const ALGEBRA_TIME = 18;

            function generateAlgebraQuestion() {
                const level = state.level;
                let a, b, c, d, equation, answer;
                const type = Math.floor(Math.random() * Math.min(5, 2 + Math.floor(level / 2)));

                switch (type) {
                    case 0: // One-step: ax = b
                        a = Math.floor(Math.random() * 9) + 2;
                        answer = Math.floor(Math.random() * 20) - 8;
                        b = a * answer;
                        equation = `${a}x = ${b}`;
                        break;
                    case 1: // Two-step: ax + b = c
                        a = Math.floor(Math.random() * 7) + 2;
                        answer = Math.floor(Math.random() * 15) - 5;
                        b = Math.floor(Math.random() * 30) - 10;
                        c = a * answer + b;
                        equation = `${a}x ${b >= 0 ? '+ ' + b : '- ' + Math.abs(b)} = ${c}`;
                        break;
                    case 2: // ax + b = cx + d
                        a = Math.floor(Math.random() * 6) + 3;
                        answer = Math.floor(Math.random() * 12) - 4;
                        c = Math.floor(Math.random() * 5) + 1;
                        if (c === a) c = a + Math.floor(Math.random() * 3) + 1;
                        b = Math.floor(Math.random() * 20) - 5;
                        d = (a - c) * answer + b;
                        equation = `${a}x ${b >= 0 ? '+ ' + b : '- ' + Math.abs(b)} = ${c}x ${d >= 0 ? '+ ' + d : '- ' + Math.abs(d)}`;
                        break;
                    case 3: // Quadratic: x² = n (perfect square)
                        answer = Math.floor(Math.random() * 10) + 2;
                        const n = answer * answer;
                        equation = `x² = ${n}`;
                        break;
                    case 4: // Fraction: x/a = b
                        a = Math.floor(Math.random() * 8) + 2;
                        answer = Math.floor(Math.random() * 10) + 1;
                        b = answer;
                        equation = `x / ${a} = ${b}`;
                        answer = a * b;
                        break;
                    default:
                        a = Math.floor(Math.random() * 8) + 2;
                        answer = Math.floor(Math.random() * 15) - 5;
                        b = a * answer;
                        equation = `${a}x = ${b}`;
                }

                algebraAnswer = Math.round(answer * 100) / 100;
                algebraQuestion.textContent = `Решите уравнение: ${equation}`;
                algebraInput.value = '';
                algebraFeedback.textContent = '';
                algebraCard.classList.remove('correct-flash', 'wrong-flash');
                resetAlgebraTimer();
            }

            function resetAlgebraTimer() {
                clearInterval(algebraTimerInterval);
                algebraTimeLeft = ALGEBRA_TIME;
                algebraTimerBar.style.width = '100%';
                algebraTimerBar.classList.remove('warning', 'danger');
                algebraTimerInterval = setInterval(() => {
                    algebraTimeLeft -= 0.1;
                    const pct = Math.max(0, (algebraTimeLeft / ALGEBRA_TIME) * 100);
                    algebraTimerBar.style.width = pct + '%';
                    if (algebraTimeLeft < ALGEBRA_TIME * 0.4) algebraTimerBar.classList.add('warning');
                    if (algebraTimeLeft < ALGEBRA_TIME * 0.2) algebraTimerBar.classList.add('danger');
                    if (algebraTimeLeft <= 0) {
                        clearInterval(algebraTimerInterval);
                        algebraFeedback.textContent = '⏰ Время вышло! Ответ: ' + algebraAnswer;
                        algebraFeedback.className = 'feedback-msg error';
                        algebraCard.classList.add('wrong-flash');
                        breakCombo();
                        loseLife();
                        state.totalWrong++;
                        setTimeout(generateAlgebraQuestion, 1500);
                    }
                }, 100);
            }

            function checkAlgebraAnswer() {
                if (algebraTimeLeft <= 0) return;
                clearInterval(algebraTimerInterval);
                const userAnswer = parseFloat(algebraInput.value.trim().replace(',', '.'));
                if (isNaN(userAnswer)) {
                    algebraFeedback.textContent = '⚠️ Введите число!';
                    algebraFeedback.className = 'feedback-msg error';
                    resetAlgebraTimer();
                    return;
                }
                const tolerance = 0.05;
                if (Math.abs(userAnswer - algebraAnswer) < tolerance) {
                    const timeBonus = Math.floor(algebraTimeLeft / ALGEBRA_TIME * 15);
                    const comboBonus = Math.min(state.combo * 3, 25);
                    const points = 20 + timeBonus + comboBonus;
                    addScore(points);
                    state.totalCorrect++;
                    algebraFeedback.textContent = `✅ Верно! +${points} очков (x=${algebraAnswer})`;
                    algebraFeedback.className = 'feedback-msg success';
                    algebraCard.classList.add('correct-flash');
                    spawnScreenParticles(15, '#4ecdc4');
                    showToast('🧮 Правильно!', '');
                    setTimeout(generateAlgebraQuestion, 1200);
                } else {
                    algebraFeedback.textContent = `❌ Неверно! Правильный ответ: x = ${algebraAnswer}`;
                    algebraFeedback.className = 'feedback-msg error';
                    algebraCard.classList.add('wrong-flash');
                    breakCombo();
                    loseLife();
                    state.totalWrong++;
                    setTimeout(generateAlgebraQuestion, 1800);
                }
            }

            btnAlgebraSubmit.addEventListener('click', checkAlgebraAnswer);
            btnSkipAlgebra.addEventListener('click', () => {
                clearInterval(algebraTimerInterval);
                algebraFeedback.textContent = '⏭ Пропущено. Ответ: ' + algebraAnswer;
                algebraFeedback.className = 'feedback-msg error';
                breakCombo();
                state.totalWrong++;
                setTimeout(generateAlgebraQuestion, 1200);
            });
            algebraInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') checkAlgebraAnswer();
            });

            // ==================== GEOMETRY ====================
            let geometryAnswer = 0;
            let geometryTimerInterval = null;
            let geometryTimeLeft = 0;
            const GEOMETRY_TIME = 20;
            let currentGeoType = '';
            let currentGeoParams = {};

            function generateGeometryQuestion() {
                const level = state.level;
                const types = ['circle', 'triangle', 'rectangle', 'pythagorean', 'square'];
                const typeIdx = Math.floor(Math.random() * Math.min(types.length, 2 + Math.floor(level / 2)));
                const type = types[typeIdx];
                currentGeoType = type;
                let answer = 0;
                let questionText = '';
                let subtitleText = '';
                const params = {};

                switch (type) {
                    case 'circle':
                        const r = Math.floor(Math.random() * 9) + 3;
                        params.r = r;
                        answer = Math.PI * r * r;
                        answer = Math.round(answer * 10) / 10;
                        questionText = 'Найдите площадь круга';
                        subtitleText = `Радиус r = ${r}. Ответ округлите до 1 знака после запятой (π ≈ 3.14)`;
                        break;
                    case 'triangle':
                        const b = Math.floor(Math.random() * 15) + 5;
                        const h = Math.floor(Math.random() * 12) + 3;
                        params.b = b;
                        params.h = h;
                        answer = 0.5 * b * h;
                        answer = Math.round(answer * 10) / 10;
                        questionText = 'Найдите площадь треугольника';
                        subtitleText = `Основание = ${b}, высота = ${h}. S = ½·b·h`;
                        break;
                    case 'rectangle':
                        const l = Math.floor(Math.random() * 12) + 4;
                        const w = Math.floor(Math.random() * 10) + 3;
                        params.l = l;
                        params.w = w;
                        answer = l * w;
                        questionText = 'Найдите площадь прямоугольника';
                        subtitleText = `Длина = ${l}, ширина = ${w}. S = l·w`;
                        break;
                    case 'pythagorean':
                        const leg1 = Math.floor(Math.random() * 8) + 3;
                        const leg2 = Math.floor(Math.random() * 8) + 4;
                        params.leg1 = leg1;
                        params.leg2 = leg2;
                        answer = Math.sqrt(leg1 * leg1 + leg2 * leg2);
                        answer = Math.round(answer * 10) / 10;
                        questionText = 'Найдите гипотенузу (Теорема Пифагора)';
                        subtitleText = `Катеты: a = ${leg1}, b = ${leg2}. c = √(a²+b²). Ответ округлите до 1 знака`;
                        break;
                    case 'square':
                        const s = Math.floor(Math.random() * 10) + 3;
                        params.s = s;
                        answer = s * s;
                        questionText = 'Найдите площадь квадрата';
                        subtitleText = `Сторона = ${s}. S = s²`;
                        break;
                }

                geometryAnswer = answer;
                currentGeoParams = params;
                geometryQuestion.textContent = questionText;
                geometrySubtitle.textContent = subtitleText;
                geometryInput.value = '';
                geometryFeedback.textContent = '';
                geometryCard.classList.remove('correct-flash', 'wrong-flash');
                drawGeometryShape(type, params);
                resetGeometryTimer();
            }

            function resetGeometryTimer() {
                clearInterval(geometryTimerInterval);
                geometryTimeLeft = GEOMETRY_TIME;
                geometryTimerBar.style.width = '100%';
                geometryTimerBar.classList.remove('warning', 'danger');
                geometryTimerInterval = setInterval(() => {
                    geometryTimeLeft -= 0.1;
                    const pct = Math.max(0, (geometryTimeLeft / GEOMETRY_TIME) * 100);
                    geometryTimerBar.style.width = pct + '%';
                    if (geometryTimeLeft < GEOMETRY_TIME * 0.4) geometryTimerBar.classList.add('warning');
                    if (geometryTimeLeft < GEOMETRY_TIME * 0.2) geometryTimerBar.classList.add('danger');
                    if (geometryTimeLeft <= 0) {
                        clearInterval(geometryTimerInterval);
                        geometryFeedback.textContent = '⏰ Время вышло! Ответ: ' + geometryAnswer;
                        geometryFeedback.className = 'feedback-msg error';
                        geometryCard.classList.add('wrong-flash');
                        breakCombo();
                        loseLife();
                        state.totalWrong++;
                        setTimeout(generateGeometryQuestion, 1500);
                    }
                }, 100);
            }

            function drawGeometryShape(type, params) {
                const ctx = ctxGeo;
                const w = geometryCanvas.width;
                const h = geometryCanvas.height;
                ctx.clearRect(0, 0, w, h);
                // Background
                ctx.fillStyle = '#0d0d1f';
                ctx.fillRect(0, 0, w, h);

                const cx = w / 2;
                const cy = h / 2;

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';

                switch (type) {
                    case 'circle':
                        const r = params.r * 18;
                        ctx.strokeStyle = '#4ecdc4';
                        ctx.lineWidth = 3;
                        ctx.setLineDash([]);
                        ctx.beginPath();
                        ctx.arc(cx, cy, r, 0, Math.PI * 2);
                        ctx.stroke();
                        // Radius line
                        ctx.strokeStyle = '#ffe66d';
                        ctx.lineWidth = 2;
                        ctx.setLineDash([5, 5]);
                        ctx.beginPath();
                        ctx.moveTo(cx, cy);
                        ctx.lineTo(cx + r, cy);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        // Labels
                        ctx.fillStyle = '#fff';
                        ctx.fillText(`r = ${params.r}`, cx + r / 2, cy - 14);
                        ctx.fillText('○', cx, cy - r - 16);
                        // Center dot
                        ctx.fillStyle = '#ff6b6b';
                        ctx.beginPath();
                        ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                        ctx.fill();
                        break;

                    case 'triangle':
                        const bw = params.b * 22;
                        const th = params.h * 22;
                        const tx = cx - bw / 2;
                        const ty = cy + th / 2;
                        ctx.strokeStyle = '#4ecdc4';
                        ctx.lineWidth = 3;
                        ctx.setLineDash([]);
                        ctx.beginPath();
                        ctx.moveTo(tx, ty);
                        ctx.lineTo(tx + bw, ty);
                        ctx.lineTo(tx + bw / 2, ty - th);
                        ctx.closePath();
                        ctx.stroke();
                        // Height dashed
                        ctx.strokeStyle = '#ffe66d';
                        ctx.lineWidth = 1.5;
                        ctx.setLineDash([4, 6]);
                        ctx.beginPath();
                        ctx.moveTo(tx + bw / 2, ty);
                        ctx.lineTo(tx + bw / 2, ty - th);
                        ctx.stroke();
                        ctx.setLineDash([]);
                        // Labels
                        ctx.fillStyle = '#fff';
                        ctx.fillText(`b = ${params.b}`, cx, ty + 20);
                        ctx.fillText(`h = ${params.h}`, tx + bw / 2 + 25, ty - th / 2);
                        // Right angle marker at base
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1;
                        const mx = tx + bw / 2;
                        ctx.strokeRect(mx - 6, ty - 6, 6, 6);
                        break;

                    case 'rectangle':
                        const rw = params.l * 18;
                        const rh = params.w * 18;
                        const rx = cx - rw / 2;
                        const ry = cy - rh / 2;
                        ctx.strokeStyle = '#4ecdc4';
                        ctx.lineWidth = 3;
                        ctx.setLineDash([]);
                        ctx.strokeRect(rx, ry, rw, rh);
                        ctx.fillStyle = 'rgba(78,205,196,0.1)';
                        ctx.fillRect(rx, ry, rw, rh);
                        ctx.fillStyle = '#fff';
                        ctx.fillText(`l = ${params.l}`, cx, ry - 10);
                        ctx.fillText(`w = ${params.w}`, rx - 22, cy);
                        break;

                    case 'pythagorean':
                        const pa = params.leg1 * 18;
                        const pb = params.leg2 * 18;
                        const px = cx - pa / 2;
                        const py = cy + pb / 2;
                        ctx.strokeStyle = '#4ecdc4';
                        ctx.lineWidth = 3;
                        ctx.setLineDash([]);
                        ctx.beginPath();
                        ctx.moveTo(px, py);
                        ctx.lineTo(px + pa, py);
                        ctx.lineTo(px, py - pb);
                        ctx.closePath();
                        ctx.stroke();
                        // Hypotenuse highlight
                        ctx.strokeStyle = '#ff6b6b';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(px + pa, py);
                        ctx.lineTo(px, py - pb);
                        ctx.stroke();
                        // Right angle
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1.5;
                        ctx.strokeRect(px, py - 8, 8, 8);
                        ctx.fillStyle = '#fff';
                        ctx.fillText(`a = ${params.leg1}`, cx, py + 22);
                        ctx.fillText(`b = ${params.leg2}`, px - 24, cy);
                        ctx.fillText('c = ?', px + pa / 2 - 20, py - pb / 2 - 8);
                        break;

                    case 'square':
                        const ss = params.s * 20;
                        const sx = cx - ss / 2;
                        const sy = cy - ss / 2;
                        ctx.strokeStyle = '#4ecdc4';
                        ctx.lineWidth = 3;
                        ctx.setLineDash([]);
                        ctx.strokeRect(sx, sy, ss, ss);
                        ctx.fillStyle = 'rgba(78,205,196,0.1)';
                        ctx.fillRect(sx, sy, ss, ss);
                        // Equal marks
                        const markSize = 6;
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 1.5;
                        for (let side = 0; side < 4; side++) {
                            let mx2, my2;
                            if (side === 0) { mx2 = sx + ss / 2;
                                my2 = sy - 8; } else if (side === 1) { mx2 = sx + ss + 8;
                                my2 = sy + ss / 2; } else if (side === 2) { mx2 = sx + ss / 2;
                                my2 = sy + ss + 8; } else { mx2 = sx - 8;
                                my2 = sy + ss / 2; }
                            ctx.beginPath();
                            ctx.moveTo(mx2 - markSize, my2);
                            ctx.lineTo(mx2 + markSize, my2);
                            ctx.stroke();
                        }
                        ctx.fillStyle = '#fff';
                        ctx.fillText(`s = ${params.s}`, cx, sy - 14);
                        break;
                }
                ctx.textAlign = 'start';
            }

            function checkGeometryAnswer() {
                if (geometryTimeLeft <= 0) return;
                clearInterval(geometryTimerInterval);
                const userAnswer = parseFloat(geometryInput.value.trim().replace(',', '.'));
                if (isNaN(userAnswer)) {
                    geometryFeedback.textContent = '⚠️ Введите число!';
                    geometryFeedback.className = 'feedback-msg error';
                    resetGeometryTimer();
                    return;
                }
                const tolerance = Math.max(0.15, geometryAnswer * 0.03);
                if (Math.abs(userAnswer - geometryAnswer) < tolerance) {
                    const timeBonus = Math.floor(geometryTimeLeft / GEOMETRY_TIME * 15);
                    const comboBonus = Math.min(state.combo * 3, 25);
                    const points = 25 + timeBonus + comboBonus;
                    addScore(points);
                    state.totalCorrect++;
                    geometryFeedback.textContent = `✅ Верно! +${points} очков (Ответ: ${geometryAnswer})`;
                    geometryFeedback.className = 'feedback-msg success';
                    geometryCard.classList.add('correct-flash');
                    spawnScreenParticles(18, '#ffe66d');
                    showToast('📏 Правильно!', '');
                    setTimeout(generateGeometryQuestion, 1200);
                } else {
                    geometryFeedback.textContent = `❌ Неверно! Правильный ответ: ${geometryAnswer}`;
                    geometryFeedback.className = 'feedback-msg error';
                    geometryCard.classList.add('wrong-flash');
                    breakCombo();
                    loseLife();
                    state.totalWrong++;
                    setTimeout(generateGeometryQuestion, 1800);
                }
            }

            btnGeometrySubmit.addEventListener('click', checkGeometryAnswer);
            btnSkipGeometry.addEventListener('click', () => {
                clearInterval(geometryTimerInterval);
                geometryFeedback.textContent = '⏭ Пропущено. Ответ: ' + geometryAnswer;
                geometryFeedback.className = 'feedback-msg error';
                breakCombo();
                state.totalWrong++;
                setTimeout(generateGeometryQuestion, 1200);
            });
            geometryInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') checkGeometryAnswer();
            });

            // ==================== INITIALIZATION ====================
            function init() {
                spawnTarget();
                drawPhysicsScene();
                generateAlgebraQuestion();
                generateGeometryQuestion();
                updateScoreUI();
                // Start on physics tab
                switchTab('physics');
            }

            // Handle canvas resize for physics
            function resizePhysicsCanvas() {
                const wrapper = physicsCanvas.parentElement;
                const maxWidth = wrapper.clientWidth;
                if (maxWidth < 760) {
                    const scale = maxWidth / 760;
                    physicsCanvas.style.width = maxWidth + 'px';
                    physicsCanvas.style.height = (420 * scale) + 'px';
                } else {
                    physicsCanvas.style.width = '760px';
                    physicsCanvas.style.height = '420px';
                }
            }
            window.addEventListener('resize', resizePhysicsCanvas);
            resizePhysicsCanvas();

            init();
            console.log('🚀 Игра готова!');
            console.log('🎯 Физика: стреляй из пушки по мишеням (пробел = огонь)');
            console.log('🧮 Алгебра: решай уравнения (Enter = проверить)');
            console.log('📏 Геометрия: вычисляй площади и гипотенузы (Enter = проверить)');
            console.log('💡 Переключайся между вкладками вверху!');
            console.log('🔥 Комбо увеличивает очки за правильные ответы!');
        })();
    </script>
</body>
